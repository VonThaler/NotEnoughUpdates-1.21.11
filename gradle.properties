# Gradle performance
org.gradle.jvmargs=-Xmx2G
org.gradle.parallel=true
org.gradle.caching=true
kotlin.incremental.useClasspathSnapshot=true

#  Mod metadata
mod_version=2.3.0-fabric-1.21.11

#  Minecraft / Fabric versions
# Minecraft 1.21.11
minecraft_version=1.21.11

# Fabric Loader - check https://fabricmc.net/develop/ for latest
loader_version=0.18.4
loom_version=1.14.7
# Fabric API - check https://modrinth.com/mod/fabric-api/versions for latest for 1.21.1
fabric_api_version=0.139.4+1.21.11
# Fabric Language Kotlin - check https://modrinth.com/mod/fabric-language-kotlin for latest
# This replaces  manual kotlin bundling from  1.8.9 build
fabric_kotlin_version=1.12.3+kotlin.2.0.21
yarn_mappings=1.21.11+build.4
# NEU Build flags
# See BuildFlags.java for usages of these values.
# Uncomment to enable pronouns in PV:
# neu.buildflags.pronouns=true
loom {
    useLegacyMixinAp = true
}
